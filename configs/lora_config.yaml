model:
  name: "unsloth/DeepSeek-R1-Distill-Qwen-7B"
  max_seq_length: 4096
  load_in_4bit: true

lora:
  r: 16
  alpha: 16
  dropout: 0
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

training:
  batch_size: 2
  gradient_accumulation_steps: 4
  warmup_steps: 5
  max_steps: 50
  learning_rate: 2.0e-4
  logging_steps: 10
  weight_decay: 0.01
  optim: "paged_adamw_8bit"
  lr_scheduler_type: "cosine"
  seed: 3407
  output_dir: "outputs"
  hub_model_id: "Arnic/DeepSeek-R1-Distill-Qwen-7B_MedicalChain-Reasoning"
  wandb_project: "Fine-tune-DeepSeek-R1_DistillQwen-7B on Medical COT Dataset"

dataset:
  path: "FreedomIntelligence/medical-o1-reasoning-SFT"
  name: "en"
  split: "train[0:500]"